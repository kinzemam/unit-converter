<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="container-fluid mx-0 py-5">
        <p class="h1" id="head">Metric/Imperial Unit Conversion</p>
        <input type="text" name="" id="input-el">
        <button id="convert-btn" class="btn btn-outline-dark px-4 py-1">CONVERT</button>
    </header>
    
    <div class="main container-fluid py-3">
        <div class="container card px-4 pt-2">
            <p class="text-left ">Length(Meter/Feet)</p>
            <p id="len-cont" class="content "></p>
        </div>
        <div class="container card px-0 py-0">
            <p class="text-left px-4 pt-2">Volume(Litre/Gallons)</p>
            <p id="vol-cont" class="content px-4 pt-2"></p>
        </div>
        <div class="container card px-0 py-0">
            <p class="text-left px-4 pt-2">Mass(Kilograms/Pounds)</p>
            <p id="mass-cont" class="content px-4 pt-2"></p>
        </div>
    </div>
    <div id='theme-el' class="theme">
        <button id="theme-btn" class="dark-btn"></button>
    </div>
    <script src="script.js"></script>
</body>

</html>
