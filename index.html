<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
</head>
<body>
    <header id="head">
    <h1>Metric/Imperial Unit Conversion</h1>
    <input type="text" name="" id="input-el">
    <button id="convert-btn">CONVERT</button>
    </header>
    <div class="main">
        <div class="container">
            <p>Length(Meter/Feet)</p>
            <p id="len-cont" class="content"></p>
        </div>
        <div class="container">
            <p>Volume(Litre/Gallons)</p>
            <p id="vol-cont" class="content"></p>
        </div>
        <div class="container">
            <p>Mass(Kilograms/Pounds)</p>
            <p id="mass-cont" class="content"></p>
        </div>
    </div>
    <div id='theme-el' class="theme">
        <button id="theme-btn" class="dark-btn"></button>
    </div>
    <script src="script.js"></script>
</body>
</html>
